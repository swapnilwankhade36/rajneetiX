<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Base/pedestal -->
  <rect x="25" y="118" width="70" height="10" rx="2" fill="#8B6914"/>
  <rect x="30" y="110" width="60" height="10" rx="2" fill="#A07820"/>
